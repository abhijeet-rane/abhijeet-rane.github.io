<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Abhijeet Rane</title>
    <link rel="icon" type="image/svg+xml" href="images/logo.svg">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --text: #e4e4e7;
            --muted: #a1a1aa;
            --cyan: #00d4ff;
            --purple: #7c3aed;
            --glass: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Dot grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: 0;
        }

        /* Mesh gradient */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 40%, rgba(0,212,255,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(124,58,237,0.07) 0%, transparent 50%);
            z-index: 0;
            animation: meshShift 12s ease-in-out infinite alternate;
        }

        @keyframes meshShift {
            0% { background-position: 0% 50%, 100% 50%; }
            100% { background-position: 100% 50%, 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            animation: glitch 3s ease-in-out infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-3px, 2px); }
            94% { transform: translate(3px, -2px); }
            96% { transform: translate(-2px, -1px); }
            98% { transform: translate(2px, 1px); }
        }

        .error-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
        }

        .error-message {
            font-size: 1.05rem;
            color: var(--muted);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .error-terminal {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 2.5rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .error-terminal .prompt { color: var(--cyan); }
        .error-terminal .path { color: var(--purple); }
        .error-terminal .err { color: #ef4444; }
        .error-terminal .suggestion { color: #22c55e; }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.8rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 9999px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn--primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }
        .btn--primary:hover {
            box-shadow: 0 6px 25px rgba(0,212,255,0.45);
            transform: translateY(-2px);
        }

        .btn--outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn--outline:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
            transform: translateY(-2px);
        }

        /* Floating shapes */
        .shape {
            position: fixed;
            border-radius: 12px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .shape--1 {
            width: 80px; height: 80px;
            border: 2px solid var(--cyan);
            top: 15%; right: 12%;
            animation: float 8s ease-in-out infinite;
        }
        .shape--2 {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            bottom: 20%; left: 10%;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @media (max-width: 480px) {
            .actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="shape shape--1"></div>
    <div class="shape shape--2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <div class="error-label">Page Not Found</div>
        <p class="error-message">
            Looks like this route doesn't exist. Maybe it was moved, renamed, or you typed the URL wrong.
        </p>
        <div class="error-terminal">
            <span class="prompt">$</span> <span class="path">~/abhijeet-rane</span> <span class="err">ERROR</span> Route not found<br>
            <span class="prompt">$</span> <span class="suggestion">TIP</span> Try navigating to the homepage instead<br>
            <span class="prompt">$</span> redirect --to <span style="color:#00d4ff">https://abhijeet-rane.github.io</span> _
        </div>
        <div class="actions">
            <a href="/" class="btn btn--primary">
                <span>Go Home</span>
            </a>
            <a href="/#projects" class="btn btn--outline">
                <span>View Projects</span>
            </a>
        </div>
    </div>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="496" height="496" rx="96" ry="96" fill="#0a0a0f" stroke="url(#grad)" stroke-width="4"/>

  <!-- Subtle inner border -->
  <rect x="28" y="28" width="456" height="456" rx="76" ry="76" fill="none" stroke="url(#grad)" stroke-width="1" opacity="0.12"/>

  <!-- Angle bracket < -->
  <text x="62" y="320" font-family="'Segoe UI','Helvetica',sans-serif" font-size="155" font-weight="300" fill="#a1a1aa" opacity="0.45">&lt;</text>

  <!-- AR text with gradient + glow -->
  <text x="256" y="320" text-anchor="middle" font-family="'Segoe UI','Helvetica',sans-serif" font-size="190" font-weight="700" fill="url(#grad)" filter="url(#glow)">AR</text>

  <!-- Closing bracket /> -->
  <text x="340" y="320" font-family="'Segoe UI','Helvetica',sans-serif" font-size="110" font-weight="300" fill="#a1a1aa" opacity="0.45">/&gt;</text>

  <!-- Cloud icon (top-right) -->
  <g transform="translate(355, 95)" filter="url(#glow)">
    <path d="M60,18 C57,8 48,0 37,0 C28,0 20,5 16,13 C7,14 0,22 0,31 C0,41 8,49 18,49 L55,49 C64,49 72,41 72,32 C72,24 66,18 60,18 Z" fill="#00d4ff" opacity="0.85"/>
  </g>
</svg>
